<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Parte de cima (roxa) -->
  <path d="M10 100 A90 90 0 0 1 190 100 Z" fill="#7b2cbf"/>

  <!-- Parte de baixo (branca) -->
  <path d="M10 100 A90 90 0 0 0 190 100 Z" fill="#ffffff"/>

  <!-- Linha do meio -->
  <rect x="10" y="95" width="180" height="10" fill="#000"/>

  <!-- Botão externo -->
  <circle cx="100" cy="100" r="20" fill="#ffffff" stroke="#000" stroke-width="5"/>

  <!-- Botão interno -->
  <circle cx="100" cy="100" r="10" fill="#000"/>

  <!-- Detalhes vermelhos -->
  <circle cx="60" cy="55" r="12" fill="#ff4d6d"/>
  <circle cx="140" cy="55" r="12" fill="#ff4d6d"/>

  <!-- Letra M -->
  <text x="100" y="75" text-anchor="middle" font-size="40" font-family="Arial" fill="#ffffff" font-weight="bold">M</text>
</svg>